version: "3.9"

services:

  db:
    image: postgres:16

    container_name: darine_postgres

    restart: always

    environment:
      POSTGRES_DB: darine_db
      POSTGRES_USER: Arad
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: darine_backend

    restart: always

    env_file:
      - .env

    environment:
      DB_HOST: db

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn darine_config.wsgi:application
      --workers 4
      --bind 0.0.0.0:8000
      "

    depends_on:
      - db

    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles

  nginx:
    image: nginx:latest

    container_name: darine_nginx

    restart: always

    ports:
      - "80:80"
      - "443:443"

    depends_on:
      - backend

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - media_volume:/app/media
      - static_volume:/app/staticfiles

volumes:
  postgres_data:
  media_volume:
  static_volume: